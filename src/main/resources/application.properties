spring.application.name=property-renting-platform

server.port=8080

# ---------- DB ----------
spring.datasource.url=jdbc:postgresql://localhost:5432/booking_clone_db
spring.datasource.username=postgres
spring.datasource.password=kimonas1997

# Hibernate should NOT create/alter schema anymore
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
#spring.jpa.properties.hibernate.format_sql=true
#logging.level.org.hibernate.SQL=DEBUG
#logging.level.org.hibernate.orm.jdbc.bind=TRACE

# ---------- Flyway ----------
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ---------- CORS ----------
app.cors.allowed-origin=http://localhost:5173

